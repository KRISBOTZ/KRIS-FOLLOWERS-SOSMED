<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - KRIS FOLLOWERS SOSMED</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    .admin-login-box .hint{color:var(--text-secondary);font-size:.88rem;margin-top:10px;line-height:1.7}
  </style>
</head>
<body>
  <div id="loading-screen" class="loading-screen" aria-live="polite" aria-busy="true">
    <div class="loading-icon">✦</div>
    <div class="loading-logo">KRIS FOLLOWERS SOSMED</div>
    <div class="loading-sub">Premium Social Media Growth</div>
    <div class="loading-bar-wrapper"><div class="loading-bar"></div></div>
  </div>

  <main class="admin-login-wrapper">
    <div class="admin-login-box">
      <h1>Login Admin</h1>
      <p>Developer / Admin hanya.</p>

      <div id="admin-login-error" class="admin-login-error"></div>

      <form onsubmit="event.preventDefault();adminLogin()">
        <div class="form-group">
          <label for="admin-email">Email / Nomor</label>
          <input id="admin-email" type="text" placeholder="ADMIN LOGIN" />
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" placeholder="ADMIN LOGIN" />
        </div>
        <button class="btn btn-primary" style="width:100%" type="submit">Masuk</button>
        <div class="hint">Autentikasi disimpan menggunakan LocalStorage.</div>
      </form>
    </div>
  </main>

  <script defer src="assets/js/main.js"></script>
</body>
</html>
